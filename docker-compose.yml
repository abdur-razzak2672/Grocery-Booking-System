version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: grocery_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: razzak72
      POSTGRES_DB: grocery_management
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grocery_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grocery_backend
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=grocery_management
      - DB_USER=postgres
      - DB_PASSWORD=razzak72
      - JWT_SECRET=grocery_super_secret_jwt_key_2024
      - JWT_EXPIRES_IN=7d
      - PORT=3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grocery_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grocery_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - grocery_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  grocery_network:
    driver: bridge
