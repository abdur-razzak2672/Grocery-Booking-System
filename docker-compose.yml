version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: grocery_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: razzak72
      POSTGRES_DB: grocery_management
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grocery_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grocery_backend
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=grocery_management
      - DB_USER=postgres
      - DB_PASSWORD=razzak72
      - JWT_SECRET=grocery_super_secret_jwt_key_2024
      - JWT_EXPIRES_IN=7d
      - PORT=8971
      - CHOKIDAR_USEPOLLING=true
    ports:
      - '8971:8971'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grocery_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grocery_frontend
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8971
      - WATCHPACK_POLLING=true
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend
    networks:
      - grocery_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  grocery_network:
    driver: bridge
